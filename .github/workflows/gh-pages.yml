name: Deploy to GitHub Pages

on:
  push:
    branches:
      - update-readme1
      - main

# Required permissions so the workflow can push to the repo and update Pages
permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # ensure the action uses the provided GITHUB_TOKEN credentials to push
          persist-credentials: true
          fetch-depth: 0

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
