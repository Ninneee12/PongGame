name: CD — Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (optional)
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies (if any)
        run: |
          if [ -f package.json ]; then npm ci; else echo "No package.json, skipping install"; fi

      - name: Build site (if applicable)
        run: |
          if [ -f package.json ] && npm run | grep -q "build"; then npm run build; else echo "No build step detected, publishing repo root"; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: "./"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
